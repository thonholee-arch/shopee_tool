<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đổi Link Shopee</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark:#0d0d0d; --dark2:#141414; --dark3:#1c1c1c; --dark4:#252525;
      --border:#2e2e2e; --text:#e8e8e8; --text2:#888;
      --orange:#ee4d2d; --orange2:#ff7a45; --accent:#f5c842;
      --green:#22c55e; --danger:#f43f5e; --shadow:rgba(238,77,45,0.18);
    }
    body {
      font-family:'Be Vietnam Pro','Segoe UI',sans-serif;
      background:var(--dark); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:24px; gap:14px;
    }
    .logo-wrap { text-align:center; }
    .logo-wrap svg { width:52px; height:52px; }
    .logo-wrap .brand { margin-top:7px; font-size:12px; font-weight:700; color:var(--text2); letter-spacing:1px; }
    .card {
      width:min(860px,100%); background:var(--dark2);
      border:1px solid var(--border); border-radius:20px;
      box-shadow:0 20px 50px rgba(0,0,0,.55); padding:26px; display:grid; gap:16px;
    }
    .header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .title  { font-size:clamp(17px,3vw,22px); font-weight:800; }
    .title span { color:var(--orange); }
    .badge {
      background:var(--dark3); border:1px solid var(--border); color:var(--text2);
      padding:5px 13px; border-radius:999px; font-size:11.5px; font-weight:700; white-space:nowrap;
    }
    .panel { background:var(--dark3); border:1px solid var(--border); border-radius:14px; padding:18px; display:grid; gap:12px; }
    .label { font-size:12.5px; font-weight:600; color:var(--text2); margin-bottom:4px; }
    .input-wrap { position:relative; }
    input[type="text"] {
      width:100%; padding:14px 46px 14px 15px;
      background:var(--dark4); border:1px solid var(--border);
      border-radius:11px; font-family:inherit; font-size:15px;
      color:var(--text); outline:none; transition:border-color .2s;
    }
    input[type="text"]:focus { border-color:var(--orange); }
    input[type="text"]::placeholder { color:#444; }
    .clear-btn {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:var(--text2);
      padding:4px; display:none; align-items:center; justify-content:center; border-radius:6px;
    }
    .clear-btn:hover { color:var(--text); }
    .clear-btn.show { display:flex; }
    .actions { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
    button {
      border:none; padding:12px 10px; border-radius:11px;
      font-family:inherit; font-weight:700; font-size:12.5px; cursor:pointer;
      transition:opacity .15s, transform .12s;
      display:flex; align-items:center; justify-content:center; gap:5px; white-space:nowrap;
    }
    button:active:not(:disabled) { transform:scale(0.97); }
    .btn-ghost { background:var(--dark4); border:1px solid var(--border); color:var(--text); }
    .btn-ghost:hover { border-color:#555; }
    .btn-primary { background:linear-gradient(135deg,var(--orange),var(--orange2)); color:#fff; box-shadow:0 8px 22px var(--shadow); }
    .btn-primary:hover { opacity:.92; }
    .btn-copy { background:var(--dark4); border:1px solid var(--border); color:var(--text); }
    .btn-copy:disabled,.btn-open:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }
    .btn-open { background:linear-gradient(135deg,#ee4d2d,#c73b22); color:#fff; box-shadow:0 8px 22px var(--shadow); }
    .result-wrap { display:none; }
    .result-wrap.show { display:block; }
    .result-box {
      background:var(--dark4); border:1px solid var(--border); border-radius:11px;
      padding:13px 15px; font-size:13px; color:var(--accent);
      word-break:break-all; line-height:1.7; font-weight:500;
    }
    .status { display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; min-height:18px; }
    .status.ok    { color:var(--green); }
    .status.err   { color:var(--danger); }
    .status .dot  { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
    .footer { font-size:11px; color:#383838; text-align:center; }
    @media(max-width:580px){ body{padding:12px;justify-content:flex-start;} .actions{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>

<div class="logo-wrap">
  <svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="14" fill="#ee4d2d"/>
  <path d="M26 10C17.16 10 10 17.16 10 26s7.16 16 16 16 16-7.16 16-16S34.84 10 26 10zm4.5 16.2-6 3.8V21h3v2.4l4.6 2.9-1.6 1.9z" fill="white"/></svg>
  <div class="brand">SHOPEE AFFILIATE</div>
</div>

<div class="card">
  <div class="header">
    <div class="title">Đổi link <span>Shopee</span> nhận voucher</div>
    <div class="badge">1 link / lần</div>
  </div>

  <div class="panel">
    <div>
      <div class="label">Nhập hoặc dán link sản phẩm Shopee</div>
      <div class="input-wrap">
        <input id="inp" type="text" placeholder="https://shopee.vn/..." autocomplete="off" />
        <button class="clear-btn" id="clrBtn" aria-label="Xóa">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="actions">
      <button id="pasteBtn" class="btn-ghost">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
        Dán link
      </button>
      <button id="cvtBtn" class="btn-primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Nhận voucher
      </button>
      <button id="cpyBtn" class="btn-copy" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Sao chép
      </button>
      <button id="opnBtn" class="btn-open" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Mở Shopee
      </button>
    </div>

    <div class="result-wrap" id="resWrap">
      <div class="label">Link affiliate của bạn</div>
      <div class="result-box" id="resBox"></div>
    </div>

    <div class="status" id="sts"></div>
  </div>

  <div class="footer">Hệ thống chỉ nhận 1 link Shopee mỗi lần · shopee.vn / shp.ee / shope.ee</div>
</div>

<script>
  // ── Cấu hình ─────────────────────────────────────────────
  const AFFILIATE_ID = '17332610461';
  const SUB_ID       = 'default';
  // ─────────────────────────────────────────────────────────

  const inp    = document.getElementById('inp');
  const clrBtn = document.getElementById('clrBtn');
  const cvtBtn = document.getElementById('cvtBtn');
  const cpyBtn = document.getElementById('cpyBtn');
  const opnBtn = document.getElementById('opnBtn');
  const resWrap= document.getElementById('resWrap');
  const resBox = document.getElementById('resBox');
  const sts    = document.getElementById('sts');
  let result   = '';

  const URL_RX = /(https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/[^\s]*)?/gi;

  function buildLink(originUrl) {
    return 'https://s.shopee.vn/an_redir'
      + '?origin_link=' + encodeURIComponent(originUrl)
      + '&affiliate_id=' + AFFILIATE_ID
      + '&sub_id=' + SUB_ID;
  }

  function extractShopee(text) {
    const ms = text.match(URL_RX) || [];
    const f  = ms.find(u => /shopee|shp\.ee|shope\.ee/.test(u));
    return f ? (f.startsWith('http') ? f : 'https://' + f) : null;
  }

  function setStatus(msg, type) {
    if (!msg) { sts.innerHTML = ''; sts.className = 'status'; return; }
    sts.innerHTML = `<div class="dot"></div> ${msg}`;
    sts.className = `status ${type}`;
  }

  function setResult(l) {
    result = l || '';
    cpyBtn.disabled = !l;
    opnBtn.disabled = !l;
    if (l) { resBox.textContent = l; resWrap.classList.add('show'); }
    else   { resWrap.classList.remove('show'); }
  }

  inp.addEventListener('input', () => {
    clrBtn.classList.toggle('show', inp.value.length > 0);
    setStatus('', ''); setResult('');
  });

  clrBtn.addEventListener('click', () => {
    inp.value = ''; clrBtn.classList.remove('show');
    setStatus('', ''); setResult(''); inp.focus();
  });

  document.getElementById('pasteBtn').addEventListener('click', async () => {
    try {
      const t = await navigator.clipboard.readText();
      if (!t) return setStatus('Clipboard trống.', 'err');
      inp.value = t.trim();
      clrBtn.classList.toggle('show', inp.value.length > 0);
      setStatus('Đã dán từ clipboard.', 'ok'); setResult('');
    } catch { setStatus('Trình duyệt không cho phép đọc clipboard.', 'err'); }
  });

  function doConvert() {
    const url = extractShopee(inp.value.trim());
    if (!url) return setStatus('Vui lòng nhập link Shopee hợp lệ.', 'err');
    const link = buildLink(url);
    setResult(link);
    setStatus('Chuyển đổi thành công!', 'ok');
  }

  cvtBtn.addEventListener('click', doConvert);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doConvert(); });

  cpyBtn.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(result); setStatus('Đã sao chép!', 'ok'); }
    catch { setStatus('Không thể sao chép.', 'err'); }
  });

  opnBtn.addEventListener('click', () => {
    if (!result) return;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAnd = /Android/i.test(navigator.userAgent);
    if (!isIOS && !isAnd) { window.location.href = result; return; }
    if (isAnd) {
      const app = `shopee://open?url=${encodeURIComponent(result)}`;
      let opened = false;
      const fr = document.createElement('iframe');
      fr.style.display = 'none'; fr.src = app; document.body.appendChild(fr);
      const t = setTimeout(() => { document.body.removeChild(fr); if (!opened) window.location.href = result; }, 1500);
      document.addEventListener('visibilitychange', function h() {
        if (document.visibilityState === 'hidden') { opened = true; clearTimeout(t); document.removeEventListener('visibilitychange', h); }
      });
      return;
    }
    window.location.href = result;
  });
</script>
</body>
</html>
